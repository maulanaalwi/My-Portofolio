<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio Frontend Web Developer — Vue.js, Tailwind CSS, komponen modern, UI responsif dan performant."
    />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8fafc" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f0f21" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Hindari FOUC tema: set class dark pada <html> sebelum bundle Vue dimuat -->
    <script>
      ;(function () {
        try {
          var STORAGE_KEY = 'portfolio-theme'
          var stored = window.localStorage.getItem(STORAGE_KEY)
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
          var dark
          if (stored === 'light') dark = false
          else if (stored === 'dark') dark = true
          else dark = prefersDark
          document.documentElement.classList.toggle('dark', Boolean(dark))
        } catch (_) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&amp;display=swap"
      rel="stylesheet"
    />

    <title>Nama Anda | Frontend Web Developer</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
